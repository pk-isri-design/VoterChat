name: Monthly Knowledge Base Update

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 2 * *' # Midnight on the 2nd of every month
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-kb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install
        working-directory: scripts

      - name: Run Verification Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: node verify_kb.js
        working-directory: scripts

      - name: Commit and Push Changes
        run: |
          git config --global user.name "VoterHelp Bot"
          git config --global user.email "bot@voterhelp.ai"
          git add backend/knowledge_base.txt frontend/functions/knowledge_base.txt
          git commit -m "chore: Automated monthly knowledge base update [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push origin master

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Full Firebase Deploy
        run: |
          cd frontend
          npm install
          npm run build
          cd functions
          npm install
          cd ..
          firebase deploy --only hosting,firestore,functions --project voterhelp-60466 --token "${{ secrets.FIREBASE_TOKEN }}"
